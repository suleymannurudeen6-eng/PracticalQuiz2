<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practical Quiz 2 – Professional Table Setting</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #f0e68c;
            padding: 8px 16px;
            border-radius: 30px;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            border: 1px solid #d4af37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }
        .info span {
            color: #ffb347;
            font-weight: bold;
        }
        .submission-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 30, 40, 0.8);
            color: #ccc;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            border-left: 3px solid #b8860b;
            backdrop-filter: blur(4px);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info">🍽️ <span>Milo®</span> | 🥛 Milk Tin | ☕☕ Two Cups | ✨ Fixed Positions</div>
    <div class="submission-note">📅 Deadline: 13 Mar 2026 • PracticalQuiz2</div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2b3c);
        
        // Subtle fog for depth
        scene.fog = new THREE.Fog(0x1a2b3c, 12, 28);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.5, 3.2, 7.5);
        camera.lookAt(2.2, 1.3, 0);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2DRenderer for subtle labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.target.set(2.2, 1.3, 0);
        controls.enableZoom = true;

        // --- Lighting (refined for professional look) ---
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);

        // Key light (warm, from window direction)
        const keyLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
        keyLight.position.set(4, 7, 5);
        keyLight.castShadow = true;
        keyLight.receiveShadow = true;
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        const d = 7;
        keyLight.shadow.camera.left = -d;
        keyLight.shadow.camera.right = d;
        keyLight.shadow.camera.top = d;
        keyLight.shadow.camera.bottom = -d;
        keyLight.shadow.camera.near = 2;
        keyLight.shadow.camera.far = 20;
        scene.add(keyLight);

        // Fill light (cool, to balance)
        const fillLight = new THREE.DirectionalLight(0xccddff, 0.5);
        fillLight.position.set(-3, 3, 5);
        scene.add(fillLight);

        // Rim/back light
        const rimLight = new THREE.PointLight(0xffffaa, 0.6);
        rimLight.position.set(-1, 4, -5);
        scene.add(rimLight);

        // Accent lights for the table area
        const tableAccent = new THREE.PointLight(0xffaa66, 1.0, 6);
        tableAccent.position.set(2.5, 2.0, 1.0);
        scene.add(tableAccent);

        // Soft glow from below (adds warmth to tins)
        const underGlow = new THREE.PointLight(0x886644, 0.5, 4);
        underGlow.position.set(2.2, 0.8, 0.2);
        scene.add(underGlow);

        // --- Environment (clean, professional backdrop) ---
        
        // Refined floor (polished wood look)
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x4a3c31, roughness: 0.4, metalness: 0.1 });
        const floorGeo = new THREE.PlaneGeometry(14, 14);
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        // Subtle rug under table
        const rugGeo = new THREE.CylinderGeometry(3.2, 3.2, 0.03, 32);
        const rugMat = new THREE.MeshStandardMaterial({ color: 0x5d4e3c, roughness: 0.8, emissive: 0x111111 });
        const rug = new THREE.Mesh(rugGeo, rugMat);
        rug.position.set(2.2, 0.015, 0);
        rug.receiveShadow = true;
        scene.add(rug);

        // Background wall panel (simple)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x6b5a4a, roughness: 0.6 });
        const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 0.3), wallMat);
        wall.position.set(2.2, 2, -4.5);
        wall.receiveShadow = true;
        scene.add(wall);

        // Decorative picture frame on wall
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x8b7a6a });
        const frameBack = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.6, 0.1), frameMat);
        frameBack.position.set(2.2, 2.2, -4.3);
        frameBack.receiveShadow = true;
        scene.add(frameBack);
        
        const pictureMat = new THREE.MeshStandardMaterial({ color: 0xc9b8a8, emissive: 0x221100 });
        const picture = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.2, 0.05), pictureMat);
        picture.position.set(2.2, 2.2, -4.2);
        scene.add(picture);

        // Floating dust particles (very subtle)
        const particleCount = 40;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12 + 2;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8 - 1;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xffeedd, size: 0.05, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // --- MAIN TABLE (elegant wooden) ---
        const tableGroup = new THREE.Group();
        tableGroup.position.set(2.2, 0, 0); // Center table at x=2.2
        
        // Table top (oval for elegance) - INCREASED THICKNESS to fix floating issue
        const topGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.2, 32);
        const topMat = new THREE.MeshStandardMaterial({ color: 0xaa8c6a, roughness: 0.3, metalness: 0.1 });
        const tableTop = new THREE.Mesh(topGeo, topMat);
        tableTop.position.y = 1.0;
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        tableGroup.add(tableTop);

        // Decorative edge trim
        const trimGeo = new THREE.TorusGeometry(2.15, 0.04, 8, 40, Math.PI*2);
        const trimMat = new THREE.MeshStandardMaterial({ color: 0xc9ae8b, roughness: 0.2, metalness: 0.3 });
        const trim = new THREE.Mesh(trimGeo, trimMat);
        trim.rotation.x = Math.PI/2;
        trim.position.y = 1.09;
        trim.castShadow = true;
        trim.receiveShadow = true;
        tableGroup.add(trim);

        // Table legs (curved style - using cylinders)
        const legMat = new THREE.MeshStandardMaterial({ color: 0x7a634b, roughness: 0.5 });
        const legPositions = [[-1.6, 0.45, -1.3], [1.6, 0.45, -1.3], [-1.6, 0.45, 1.3], [1.6, 0.45, 1.3]];
        legPositions.forEach(pos => {
            const legBase = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 0.9, 8), legMat);
            legBase.position.set(pos[0], pos[1], pos[2]);
            legBase.castShadow = true;
            legBase.receiveShadow = true;
            tableGroup.add(legBase);
            
            // foot detail
            const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.2, 0.1, 6), legMat);
            foot.position.set(pos[0], 0.05, pos[2]);
            foot.castShadow = true;
            foot.receiveShadow = true;
            tableGroup.add(foot);
        });

        scene.add(tableGroup);

        // --- CHAIRS (2 chairs, positioned professionally) ---
        function createChair(x, z, rotationY) {
            const chairGroup = new THREE.Group();
            
            // Seat
            const seatGeo = new THREE.BoxGeometry(0.9, 0.1, 0.9);
            const seatMat = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.6 });
            const seat = new THREE.Mesh(seatGeo, seatMat);
            seat.position.y = 0.45;
            seat.castShadow = true;
            seat.receiveShadow = true;
            chairGroup.add(seat);

            // Backrest (curved slightly using two boxes)
            const backMat = new THREE.MeshStandardMaterial({ color: 0x7a634b });
            const backMain = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.7, 0.1), backMat);
            backMain.position.set(0, 0.8, -0.4);
            backMain.castShadow = true;
            backMain.receiveShadow = true;
            chairGroup.add(backMain);
            
            // Top rail
            const topRail = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.1, 0.1), backMat);
            topRail.position.set(0, 1.26, -0.4);
            topRail.castShadow = true;
            topRail.receiveShadow = true;
            chairGroup.add(topRail);

            // Legs
            const legGeo = new THREE.CylinderGeometry(0.08, 0.1, 0.5);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a });
            const legPositions = [[-0.35, 0.25, -0.35], [0.35, 0.25, -0.35], [-0.35, 0.25, 0.35], [0.35, 0.25, 0.35]];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                leg.receiveShadow = true;
                chairGroup.add(leg);
            });

            chairGroup.position.set(x, 0, z);
            chairGroup.rotation.y = rotationY;
            return chairGroup;
        }

        // Position chairs around the table (centered at 2.2,0,0)
        scene.add(createChair(2.2, 1.8, Math.PI));      // front chair facing outward
        scene.add(createChair(2.2, -1.8, 0)); // back chair facing outward

        // --- PROFESSIONAL ARRANGEMENT OF ITEMS ON TABLE ---
        // CORRECTED TABLE SURFACE HEIGHT: table top y=1.0 + half thickness (0.1) = 1.1
        const tableSurfaceY = 1.1;

        // Helper to create a tin (refined) - FIXED positioning
        function createTin(color, height, radius, posX, posZ, labelColor, emissive = 0x000000) {
            const tinGroup = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(radius, radius*0.98, height, 24);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.3, emissive: emissive });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = height/2;
            body.castShadow = true;
            body.receiveShadow = true;
            tinGroup.add(body);

            // Top rim
            const rimGeo = new THREE.TorusGeometry(radius+0.02, 0.03, 8, 20);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });
            const rim = new THREE.Mesh(rimGeo, rimMat);
            rim.rotation.x = Math.PI/2;
            rim.position.y = height - 0.02;
            rim.castShadow = true;
            tinGroup.add(rim);

            // Base ring
            const baseRingGeo = new THREE.TorusGeometry(radius-0.02, 0.02, 6, 20);
            const baseRingMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5 });
            const baseRing = new THREE.Mesh(baseRingGeo, baseRingMat);
            baseRing.rotation.x = Math.PI/2;
            baseRing.position.y = 0.04;
            baseRing.castShadow = true;
            tinGroup.add(baseRing);

            // Label band
            const labelGeo = new THREE.CylinderGeometry(radius+0.015, radius+0.015, height*0.5, 24);
            const labelMat = new THREE.MeshStandardMaterial({ color: labelColor, roughness: 0.4 });
            const label = new THREE.Mesh(labelGeo, labelMat);
            label.position.y = height/2;
            label.castShadow = false;
            tinGroup.add(label);

            // CRITICAL FIX: Position tin directly on table surface
            tinGroup.position.set(posX, tableSurfaceY, posZ);
            
            return tinGroup;
        }

        // Helper to create a cup (elegant) - FIXED positioning
        function createCup(posX, posZ, color, rimColor) {
            const cupGroup = new THREE.Group();
            const cupHeight = 0.35;
            const cupRadius = 0.22;
            
            // Body
            const bodyGeo = new THREE.CylinderGeometry(cupRadius*1.1, cupRadius*0.9, cupHeight, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = cupHeight/2;
            body.castShadow = true;
            body.receiveShadow = true;
            cupGroup.add(body);
            
            // Inner lining
            const innerGeo = new THREE.CylinderGeometry(cupRadius*0.9, cupRadius*0.7, cupHeight*0.7, 16);
            const innerMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e6, roughness: 0.2 });
            const inner = new THREE.Mesh(innerGeo, innerMat);
            inner.position.y = cupHeight/2 + 0.05;
            inner.castShadow = true;
            cupGroup.add(inner);

            // Rim
            const rimGeo = new THREE.TorusGeometry(cupRadius*1.05, 0.03, 6, 20);
            const rimMat = new THREE.MeshStandardMaterial({ color: rimColor, roughness: 0.2, metalness: 0.5 });
            const rim = new THREE.Mesh(rimGeo, rimMat);
            rim.rotation.x = Math.PI/2;
            rim.position.y = cupHeight - 0.02;
            rim.castShadow = true;
            cupGroup.add(rim);

            // Handle
            const handleGeo = new THREE.TorusGeometry(0.15, 0.03, 6, 20, Math.PI/2);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.6 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.rotation.z = Math.PI/2;
            handle.rotation.y = 0.2;
            handle.position.set(0.28, cupHeight*0.7, 0);
            handle.castShadow = true;
            cupGroup.add(handle);

            // CRITICAL FIX: Position cup directly on table surface
            cupGroup.position.set(posX, tableSurfaceY, posZ);
            return cupGroup;
        }

        // ---- PROFESSIONAL PLACEMENT ----
        // Center piece: a small decorative tray - FIXED positioning
        const trayGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.05, 10);
        const trayMat = new THREE.MeshStandardMaterial({ color: 0xccbbaa, roughness: 0.4 });
        const tray = new THREE.Mesh(trayGeo, trayMat);
        tray.position.set(2.2, tableSurfaceY + 0.025, 0); // Slightly above table
        tray.rotation.x = 0;
        tray.castShadow = true;
        tray.receiveShadow = true;
        scene.add(tray);

        // Biscuit arrangement on tray (3 cookies) - FIXED positioning
        for (let i = 0; i < 3; i++) {
            const cookieGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.04, 8);
            const cookieMat = new THREE.MeshStandardMaterial({ color: 0xc99a6b });
            const cookie = new THREE.Mesh(cookieGeo, cookieMat);
            cookie.position.set(2.2 + (i-1)*0.25, tableSurfaceY + 0.07, 0.1);
            cookie.rotation.x = 0;
            cookie.castShadow = true;
            cookie.receiveShadow = true;
            scene.add(cookie);
        }

        // MILO TIN - placed left-front on table
        const miloTin = createTin(0xb33e3e, 0.45, 0.27, 1.8, 0.6, 0xffaa00, 0x220000);
        scene.add(miloTin);

        // MILK TIN - placed right-front, symmetrical with Milo
        const milkTin = createTin(0xeeeeee, 0.4, 0.25, 2.6, 0.6, 0x2266aa, 0x001122);
        scene.add(milkTin);

        // TWO CUPS - placed behind the tins, flanking the center
        scene.add(createCup(1.6, -0.4, 0xb87333, 0xcd7f32)); // left cup
        scene.add(createCup(2.8, -0.4, 0xd2b48c, 0x8b7355)); // right cup

        // Additional professional touches: small spoons beside cups - FIXED positioning
        function createSpoon(posX, posZ, rotation) {
            const spoonGroup = new THREE.Group();
            const handleGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.5);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.rotation.x = Math.PI/2;
            handle.position.set(0, 0, 0.2);
            handle.castShadow = true;
            spoonGroup.add(handle);
            
            const headGeo = new THREE.SphereGeometry(0.1, 8);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.set(0, 0, 0.5);
            head.castShadow = true;
            spoonGroup.add(head);
            
            spoonGroup.position.set(posX, tableSurfaceY + 0.06, posZ);
            spoonGroup.rotation.y = rotation;
            spoonGroup.rotation.z = -0.1;
            return spoonGroup;
        }

        scene.add(createSpoon(1.5, -0.3, 0.3));
        scene.add(createSpoon(2.9, -0.3, -0.3));

        // Small elegant coaster under each cup - FIXED positioning
        const coasterMat = new THREE.MeshStandardMaterial({ color: 0x4a3c31, roughness: 0.7 });
        const coaster1 = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.03, 6), coasterMat);
        coaster1.position.set(1.6, tableSurfaceY - 0.01, -0.4);
        coaster1.receiveShadow = true;
        scene.add(coaster1);
        
        const coaster2 = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.03, 6), coasterMat);
        coaster2.position.set(2.8, tableSurfaceY - 0.01, -0.4);
        coaster2.receiveShadow = true;
        scene.add(coaster2);

        // A small elegant vase (optional beautification) - FIXED positioning
        const vaseGeo = new THREE.CylinderGeometry(0.15, 0.12, 0.4, 8);
        const vaseMat = new THREE.MeshStandardMaterial({ color: 0x88aadd, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.6 });
        const vase = new THREE.Mesh(vaseGeo, vaseMat);
        vase.position.set(2.2, tableSurfaceY + 0.2, -1.0);
        vase.castShadow = true;
        vase.receiveShadow = true;
        scene.add(vase);
        
        // Flower (simple sphere) - FIXED positioning
        const flowerGeo = new THREE.SphereGeometry(0.1, 6);
        const flowerMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
        const flower = new THREE.Mesh(flowerGeo, flowerMat);
        flower.position.set(2.2, tableSurfaceY + 0.42, -1.0);
        flower.castShadow = true;
        scene.add(flower);

        // CRITICAL FIX: Labels attached directly to tins as children (so they move with them)
        // Create label for Milo tin
        const miloDiv = document.createElement('div');
        miloDiv.textContent = 'MILO';
        miloDiv.style.color = '#ffcc00';
        miloDiv.style.fontWeight = 'bold';
        miloDiv.style.fontSize = '12px';
        miloDiv.style.textShadow = '1px 1px 2px #000';
        miloDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        miloDiv.style.padding = '2px 6px';
        miloDiv.style.borderRadius = '4px';
        miloDiv.style.border = '1px solid #ffaa00';
        const miloLabel = new CSS2DObject(miloDiv);
        miloLabel.position.set(0, 0.35, 0); // Position relative to tin
        miloTin.add(miloLabel); // Attach to miloTin group

        // Create label for Milk tin
        const milkDiv = document.createElement('div');
        milkDiv.textContent = 'MILK';
        milkDiv.style.color = 'white';
        milkDiv.style.fontWeight = 'bold';
        milkDiv.style.fontSize = '12px';
        milkDiv.style.textShadow = '1px 1px 2px #2266aa';
        milkDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        milkDiv.style.padding = '2px 6px';
        milkDiv.style.borderRadius = '4px';
        milkDiv.style.border = '1px solid #2266aa';
        const milkLabel = new CSS2DObject(milkDiv);
        milkLabel.position.set(0, 0.32, 0); // Position relative to tin
        milkTin.add(milkLabel); // Attach to milkTin group

        // --- Animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // --- Resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
